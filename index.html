<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heatmap Tracker</title>

  <style>
    :root {
      --bg-empty: #ebedf0;
      --bg-lvl1: #9be9a8;
      --bg-lvl2: #40c463;
      --bg-lvl3: #30a14e;
      --bg-lvl4: #216e39;
    }

    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 20px;
      background: #ffffff;
      color: #24292e;
    }

    h1 {
      margin-bottom: 20px;
    }

    .heatmap {
      display: grid;
      grid-template-columns: repeat(53, 14px);
      gap: 4px;
      margin-bottom: 30px;
    }

    .cell {
      width: 14px;
      height: 14px;
      background: var(--bg-empty);
      border-radius: 2px;
      transition: transform 0.1s;
      cursor : pointer;
    }

    .cell:hover {
      transform: scale(1.15);
    }

    .lvl-1 {
      background: var(--bg-lvl1);
    }

    .lvl-2 {
      background: var(--bg-lvl2);
    }

    .lvl-3 {
      background: var(--bg-lvl3);
    }

    .lvl-4 {
      background: var(--bg-lvl4);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: #2ea44f;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #2c974b;
    }

    ul {
      padding: 0;
      list-style: none;
    }

    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #eaecef;
      cursor: pointer;
    }

    li.completed span {
      text-decoration: line-through;
      opacity: 0.6;
    }

    li button {
      background: #d73a49;
      padding: 6px 10px;
      font-size: 12px;
    }

    li button:hover {
      background: #cb2431;
    }

    .empty-state {
      color: #6a737d;
      padding: 10px;
    }
  </style>
</head>

<body>

  <h1>Heatmap Tracker</h1>

  <div id="heatmap" class="heatmap"></div>

  <div class="input-row">
    <input
      id="task-input"
      type="text"
      placeholder="Write a task..."
    />

    <button id="add-btn">
      Add Task
    </button>
  </div>

  <ul id="task-list"></ul>

  <script type="module" src="/main.js"></script>

</body>
</html>
