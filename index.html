<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Heatmap Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>Heatmap Tracker</h1>

  <div id="streak-container">
    <div class="streak-card">
      Current Streak: <span id="current-streak">0</span>
    </div>
    <div class="streak-card">
      Best Streak: <span id="best-streak">0</span>
    </div>
  </div>

  <div id="heatmap-wrapper">
    <div id="month-labels" class="month-labels"></div>
    <div id="heatmap" class="heatmap"></div>
  </div>

  <div class="input-row">
    <input id="task-input" type="text" placeholder="Write a task..." />
    <button id="add-btn">Add Task</button>
  </div>

  <ul id="task-list"></ul>

  <script type="module" src="/main.js"></script>
</body>
</html>
